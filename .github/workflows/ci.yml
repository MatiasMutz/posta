name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api db:check
      - run: pnpm test

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      REDIS_URL: redis://localhost:6379
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start Supabase local
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply migrations and wire env
        run: |
          chmod +x scripts/ci/*.sh
          ./scripts/ci/sync-supabase-migrations.sh
          supabase start
          ./scripts/ci/write-e2e-env.sh
      - run: pnpm test:integration

  openapi-smoke:
    name: OpenAPI Smoke
    runs-on: ubuntu-latest
    needs: integration-tests
    env:
      REDIS_URL: redis://localhost:6379
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:packages && pnpm --filter api build
      - name: Start Supabase and API for OpenAPI smoke
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply migrations and run smoke
        run: |
          chmod +x scripts/ci/*.sh scripts/openapi-smoke.sh
          ./scripts/ci/sync-supabase-migrations.sh
          supabase start
          ./scripts/ci/write-e2e-env.sh
          pnpm --filter api start &
          for i in $(seq 1 45); do
            curl -sf http://localhost:3001/api/v1/health && break
            sleep 2
          done
          ./scripts/openapi-smoke.sh

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    env:
      CI: true
      REDIS_URL: redis://localhost:6379
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium webkit
      - name: Start Supabase local
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply migrations and wire env for E2E
        run: |
          chmod +x scripts/ci/*.sh
          ./scripts/ci/sync-supabase-migrations.sh
          supabase start
          ./scripts/ci/write-e2e-env.sh
      - run: pnpm test:e2e

  e2e-afip-resilience:
    name: E2E AFIP Resilience
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    env:
      CI: true
      REDIS_URL: redis://localhost:6379
      AFIP_MOCK_FAIL: 'true'
      E2E_AFIP_FAIL: '1'
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Start Supabase local
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply migrations and wire env for E2E
        run: |
          chmod +x scripts/ci/*.sh
          ./scripts/ci/sync-supabase-migrations.sh
          supabase start
          ./scripts/ci/write-e2e-env.sh
      - name: Run AFIP resilience E2E
        run: pnpm test:e2e:afip
