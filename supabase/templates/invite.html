<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Invitación a Posta</title>
</head>
<body style="font-family: Georgia, serif; background: #faf6ec; color: #1a1612; padding: 32px;">
  <div style="max-width: 480px; margin: 0 auto; background: #ffffff; border: 1px solid #d8cfc0; padding: 32px;">
    <h1 style="font-size: 24px; margin: 0 0 8px;">Te invitaron a Posta</h1>
    <p style="font-family: system-ui, sans-serif; color: #7a6e62; line-height: 1.5;">
      Alguien de tu equipo te sumó a su negocio en Posta. Hacé clic en el botón para activar tu cuenta y elegir tu contraseña.
    </p>
    <p style="margin: 24px 0;">
      <a href="{{ .ConfirmationURL }}"
         style="display: inline-block; background: #c9542e; color: #ffffff; text-decoration: none; padding: 12px 24px; font-family: system-ui, sans-serif; font-size: 14px;">
        Activar mi cuenta
      </a>
    </p>
    <p style="font-family: system-ui, sans-serif; font-size: 12px; color: #7a6e62;">
      Si no esperabas este email, podés ignorarlo.
    </p>
  </div>
</body>
</html>
